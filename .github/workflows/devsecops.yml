name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_REPOSITORY: sevwork
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

jobs:
  code-security:
    name: "🔍 Análisis de Código"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Gitleaks — Detección de secretos"
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "🐍 Bandit — Análisis de seguridad Python"
        run: |
          pip install bandit
          echo "## 🐍 Reporte de Bandit (Python)" >> $GITHUB_STEP_SUMMARY
          
          bandit -r api-gateway/app/ -f custom --msg-template "*{line}* {test_id} - **{severity}**: {msg}" > bandit-api.txt || true
          echo "### API Gateway" >> $GITHUB_STEP_SUMMARY
          if [ -s bandit-api.txt ]; then echo '```text' >> $GITHUB_STEP_SUMMARY && cat bandit-api.txt >> $GITHUB_STEP_SUMMARY && echo '```' >> $GITHUB_STEP_SUMMARY; else echo "✅ Sin problemas críticos" >> $GITHUB_STEP_SUMMARY; fi
          
          bandit -r worker/ -f custom --msg-template "*{line}* {test_id} - **{severity}**: {msg}" > bandit-worker.txt || true
          echo "### Worker" >> $GITHUB_STEP_SUMMARY
          if [ -s bandit-worker.txt ]; then echo '```text' >> $GITHUB_STEP_SUMMARY && cat bandit-worker.txt >> $GITHUB_STEP_SUMMARY && echo '```' >> $GITHUB_STEP_SUMMARY; else echo "✅ Sin problemas críticos" >> $GITHUB_STEP_SUMMARY; fi
          
          # Mantener la compatibilidad para artifact subida si hace falta
          bandit -r api-gateway/app/ -f json -o bandit-report.json || true

      - name: "🔎 Semgrep — Patrones de seguridad"
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten

      - name: Subir reportes de seguridad
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-security-reports
          path: |
            bandit-report.json

  dependency-scan:
    name: "📦 Análisis de Dependencias"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: "🔒 Trivy — Escaneo de dependencias API"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './api-gateway'
          format: 'table'
          output: 'trivy-deps-api.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: "🔒 Trivy — Escaneo de dependencias Worker"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './worker'
          format: 'table'
          output: 'trivy-deps-worker.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: "🔒 Trivy — Escaneo de dependencias Frontend"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'table'
          output: 'trivy-deps-frontend.txt'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: "📊 Resumen de Trivy (Dependencias)"
        if: always()
        run: |
          echo "## 📦 Reporte de Dependencias (Trivy)" >> $GITHUB_STEP_SUMMARY
          for comp in api worker frontend; do
            echo "### Componente: $comp" >> $GITHUB_STEP_SUMMARY
            if [ -s trivy-deps-$comp.txt ]; then
              echo '```text' >> $GITHUB_STEP_SUMMARY
              cat trivy-deps-$comp.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Sin vulnerabilidades críticas o altas" >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ -s trivy-deps-api.txt ] || [ -s trivy-deps-worker.txt ] || [ -s trivy-deps-frontend.txt ]; then exit 1; fi

  # ══════════════════════════════════════════
  # FASE 2.5: IaC — Escaneo de infraestructura como código
  # ══════════════════════════════════════════
  iac-scan:
    name: "🏗️ Escaneo IaC (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "🔍 Checkov — Escaneo de Dockerfiles y Compose"
        id: checkov-scan
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        with:
          directory: .
          framework: dockerfile,yaml
          soft_fail: false
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3,CKV2_DOCKER_1
          output_format: cli
          output_file_path: console,checkov-report.txt

      - name: "📊 Resumen de Checkov (IaC)"
        if: always()
        run: |
          echo "## 🏗️ Reporte de Infraestructura (Checkov)" >> $GITHUB_STEP_SUMMARY
          if ls checkov-report.txt* 1> /dev/null 2>&1; then
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat checkov-report.txt* | head -n 100 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Validaciones correctas" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.checkov-scan.outcome }}" == "failure" ]; then exit 1; fi


  build-and-scan:
    name: "🏗️ Build y Escaneo de Imágenes"
    runs-on: ubuntu-latest
    needs: [code-security, dependency-scan, iac-scan]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: "🐳 Build — API Gateway"
        run: docker build -t api-temp:${{ github.sha }} ./api-gateway

      - name: "🐳 Build — Worker"
        run: docker build -t worker-temp:${{ github.sha }} ./worker

      - name: "🐳 Build — Frontend"
        run: docker build -t frontend-temp:${{ github.sha }} ./frontend

      - name: "🔒 Trivy — Escaneo imagen API"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api-temp:${{ github.sha }}'
          format: 'table'
          output: 'trivy-image-api.txt'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true

      - name: "🔒 Trivy — Escaneo imagen Worker"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'worker-temp:${{ github.sha }}'
          format: 'table'
          output: 'trivy-image-worker.txt'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true

      - name: "🔒 Trivy — Escaneo imagen Frontend"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend-temp:${{ github.sha }}'
          format: 'table'
          output: 'trivy-image-frontend.txt'
          severity: 'CRITICAL'
          exit-code: '0'
          ignore-unfixed: true

      - name: "📊 Resumen de Trivy (Imágenes Docker)"
        if: always()
        run: |
          echo "## 🐳 Reporte de Imágenes (Trivy)" >> $GITHUB_STEP_SUMMARY
          for comp in api worker frontend; do
            echo "### Imagen: $comp" >> $GITHUB_STEP_SUMMARY
            if [ -s trivy-image-$comp.txt ]; then
              echo '```text' >> $GITHUB_STEP_SUMMARY
              cat trivy-image-$comp.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Sin vulnerabilidades críticas detectadas" >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ -s trivy-image-api.txt ] || [ -s trivy-image-worker.txt ] || [ -s trivy-image-frontend.txt ]; then exit 1; fi

  test:
    name: "🧪 Pruebas Unitarias"
    runs-on: ubuntu-latest
    needs: [code-security]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          cd api-gateway
          pip install -r requirements.txt

      - name: "✅ Ejecutar Pytest"
        run: |
          cd api-gateway
          pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET_KEY: "test-secret-key-only-for-ci"
          REDIS_URL: "redis://localhost:6379/0"

  dast:
    name: "🌐 OWASP ZAP (DAST)"
    runs-on: ubuntu-latest
    needs: [build-and-scan, test]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Levantar API para escaneo
        run: |
          cd api-gateway
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 8
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET_KEY: "test-secret-key-only-for-ci"
          REDIS_URL: "redis://localhost:6379/0"

      - name: "🕷️ OWASP ZAP — Escaneo de API"
        uses: zaproxy/action-api-scan@v0.7.0
        continue-on-error: true
        with:
          target: 'http://localhost:8000/openapi.json'
          fail_action: false
          cmd_options: '-a'
          issue_title: ''

      - name: "📊 Resumen de OWASP ZAP (DAST)"
        if: always()
        run: |
          echo "## 🌐 Reporte de ZAP DAST" >> $GITHUB_STEP_SUMMARY
          if [ -f report_md.md ]; then
            cat report_md.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No se detectaron alertas o no se generó el reporte." >> $GITHUB_STEP_SUMMARY
          fi

  push-dev-images:
    name: "📤 Push Dev Images — Docker Hub"
    runs-on: ubuntu-latest
    needs: [build-and-scan, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Obtener nombre de rama
        id: branch_name
        run: echo "BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Obtener SHA corto
        id: short_sha
        run: echo "SHA_SHORT=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: "📦 Build & Push — API Gateway DEV"
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:api-${{ steps.branch_name.outputs.BRANCH }}-latest
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:api-${{ steps.branch_name.outputs.BRANCH }}-${{ steps.short_sha.outputs.SHA_SHORT }}

      - name: "📦 Build & Push — Worker DEV"
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:worker-${{ steps.branch_name.outputs.BRANCH }}-latest
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:worker-${{ steps.branch_name.outputs.BRANCH }}-${{ steps.short_sha.outputs.SHA_SHORT }}

      - name: "📦 Build & Push — Frontend DEV"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-${{ steps.branch_name.outputs.BRANCH }}-latest
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-${{ steps.branch_name.outputs.BRANCH }}-${{ steps.short_sha.outputs.SHA_SHORT }}

  release:
    name: "🚀 Release — Docker Hub"
    runs-on: ubuntu-latest
    needs: [build-and-scan, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Obtener versión
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: "📦 Build & Push — API Gateway RELEASE"
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:api-${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:api-latest

      - name: "📦 Build & Push — Worker RELEASE"
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:worker-${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:worker-latest

      - name: "📦 Build & Push — Frontend RELEASE"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_REPOSITORY }}:frontend-latest